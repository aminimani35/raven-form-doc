<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#059669" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="240" cy="180" r="170" fill="url(#bg)" opacity="0.6"/>

  <!-- Main form card -->
  <rect x="80" y="60" width="320" height="240" rx="16" fill="url(#card)" filter="url(#shadow)" stroke="#d1fae5" stroke-width="1.5"/>

  <!-- Card header bar -->
  <rect x="80" y="60" width="320" height="44" rx="16" fill="url(#brand)"/>
  <rect x="80" y="88" width="320" height="16" fill="url(#brand)"/>
  <circle cx="108" cy="82" r="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="128" cy="82" r="6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="148" cy="82" r="6" fill="rgba(255,255,255,0.4)"/>
  <text x="200" y="87" font-family="sans-serif" font-size="11" fill="white" font-weight="600" text-anchor="middle">Raven Form</text>

  <!-- Input fields -->
  <!-- Row 1 -->
  <rect x="104" y="124" width="128" height="28" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="114" y="142" font-family="sans-serif" font-size="9" fill="#6b7280">First Name</text>

  <rect x="248" y="124" width="128" height="28" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="258" y="142" font-family="sans-serif" font-size="9" fill="#6b7280">Last Name</text>

  <!-- Row 2 -->
  <rect x="104" y="166" width="272" height="28" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="114" y="184" font-family="sans-serif" font-size="9" fill="#6b7280">Email Address</text>

  <!-- Row 3 -->
  <rect x="104" y="208" width="128" height="28" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="114" y="226" font-family="sans-serif" font-size="9" fill="#6b7280">Role ▾</text>

  <rect x="248" y="208" width="128" height="28" rx="6" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="258" y="226" font-family="sans-serif" font-size="9" fill="#6b7280">Phone</text>

  <!-- Submit button -->
  <rect x="340" y="256" width="92" height="28" rx="7" fill="url(#brand)"/>
  <text x="386" y="274" font-family="sans-serif" font-size="10" fill="white" font-weight="700" text-anchor="middle">Submit →</text>

  <!-- Switch toggle -->
  <rect x="104" y="260" width="40" height="22" rx="11" fill="#10b981"/>
  <circle cx="133" cy="271" r="8" fill="white"/>
  <text x="152" y="275" font-family="sans-serif" font-size="9" fill="#374151">Active</text>

  <!-- Decorative dots -->
  <circle cx="52" cy="100" r="8" fill="#10b981" opacity="0.3"/>
  <circle cx="36" cy="130" r="5" fill="#34d399" opacity="0.4"/>
  <circle cx="428" cy="240" r="10" fill="#10b981" opacity="0.25"/>
  <circle cx="444" cy="210" r="6" fill="#6ee7b7" opacity="0.4"/>
  <circle cx="60" cy="260" r="12" fill="#a7f3d0" opacity="0.5"/>

  <!-- Check icon top right -->
  <circle cx="428" cy="90" r="18" fill="#10b981" opacity="0.15"/>
  <path d="M420 90 l5 5 l9-9" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
